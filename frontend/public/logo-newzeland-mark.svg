<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 104" role="img" aria-label="Newzeland Cerámicas">
  <!-- Marca Newzeland: dos paneles cerámicos plegados en perspectiva -->
  <!-- panel pequeño izquierdo -->
  <polygon points="0,30 14,18 14,66 0,78" fill="#8a857b"/>
  <polygon points="16,18 36,18 36,66 16,66" fill="#26374a"/>
  <!-- panel grande derecho en forma de puerta -->
  <polygon points="44,16 58,2 94,2 80,16" fill="#8a857b"/>
  <polygon points="44,16 80,16 80,102 66,102 66,34 58,34 58,88 44,88" fill="#26374a"/>
  <polygon points="82,16 94,4 94,90 82,102" fill="#8a857b"/>
</svg>
