<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/newzelland-ceramicas/logo-newzeland-mark.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Newzelland Cerámicas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
    <script>
      // Store the URL to restore it after redirect
      if (location.pathname !== '/newzelland-ceramicas/') {
        sessionStorage.redirect = location.pathname + location.search + location.hash;
        location.replace('/newzelland-ceramicas/index.html');
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      // Restore the URL from sessionStorage
      if (sessionStorage.redirect) {
        const redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        // Use history.replaceState to update the URL without a reload
        window.history.replaceState({}, '', redirect);
      }
    </script>
    <script type="module" src="/newzelland-ceramicas/index.html"></script>
  </body>
</html>
