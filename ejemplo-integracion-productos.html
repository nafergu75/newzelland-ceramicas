<!--
EJEMPLO DE INTEGRACIÓN EN PRODUCTOS.HTML

Este archivo muestra cómo agregar la funcionalidad de carrito
a la página de productos.

PASOS:
1. Incluir los scripts en el HEAD o antes de </body>:
   - carrito-boxed.js (clase del carrito)
   - producto-integrado.js (funciones de integración)

2. En cada producto, añadir:
   - ID único: data-formato y data-serie
   - Botón "Añadir al carrito" con onclick

3. Actualizar el contador en la navbar
-->

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Productos - Newzeland Cerámicas</title>
    <!-- ... estilos normales ... -->
</head>
<body>
    <!-- NAVBAR CON CONTADOR DE CARRITO -->
    <header>
        <nav>
            <div class="logo">Newzeland Cerámicas</div>
            <div class="nav-icons">
                <a href="tienda.html" class="cart-icon">
                    Cesta <span id="cart-count">0</span>
                </a>
            </div>
        </nav>
    </header>

    <!-- EJEMPLO 1: Producto individual con tarifa -->
    <section class="producto">
        <h2>Atlas 60×60</h2>
        <p>Versátil y moderna</p>

        <!-- Información de la tarifa (cargada desde JSON) -->
        <div class="producto-tarifa">
            <p><strong>5.4 m²</strong> por caja</p>
            <p><strong>23.98€</strong> por caja</p>
        </div>

        <!-- Input de cantidad y botón de carrito -->
        <div class="producto-compra">
            <label for="cantidad-atlas">Cajas:</label>
            <input
                type="number"
                id="cantidad-atlas"
                min="1"
                value="1"
                data-formato="60x60"
                data-serie="ATLAS"
            >
            <button onclick="
                const input = document.getElementById('cantidad-atlas');
                agregarAlCarritoDesdeProducto(
                    input.dataset.formato,
                    input.dataset.serie,
                    input.value
                )
            ">
                Añadir al carrito
            </button>
        </div>
    </section>

    <!-- EJEMPLO 2: Grid de productos (más común) -->
    <section class="productos-grid">
        <div class="producto-card">
            <h3>Calacata 60×120</h3>
            <p data-formato="60x120" data-serie="BRILLO">Elegancia inspirada en mármol</p>
            <div class="precio">18.50€/caja</div>
            <div class="metros">5.4 m²/caja</div>
            <input type="number" min="1" value="1" id="cant-calacata" data-formato="60x120" data-serie="BRILLO">
            <button onclick="
                const el = document.getElementById('cant-calacata');
                agregarAlCarritoDesdeProducto(el.dataset.formato, el.dataset.serie, el.value)
            ">
                Añadir
            </button>
        </div>

        <div class="producto-card">
            <h3>Bases 30×60</h3>
            <div class="precio">15.98€/caja</div>
            <div class="metros">5.4 m²/caja</div>
            <input type="number" min="1" value="1" id="cant-bases" data-formato="30x60" data-serie="BASES">
            <button onclick="
                const el = document.getElementById('cant-bases');
                agregarAlCarritoDesdeProducto(el.dataset.formato, el.dataset.serie, el.value)
            ">
                Añadir
            </button>
        </div>
    </section>

    <!-- SCRIPTS: INCLUIR AL FINAL DEL BODY -->
    <script src="js/carrito-boxed.js"></script>
    <script src="js/producto-integrado.js"></script>

    <!-- Inicialización del contador en la navbar -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Carga el carrito guardado
            carrito.cargarCarrito();

            // Actualiza el contador inicial
            actualizarContadorCarrito();
        });
    </script>
</body>
</html>

<!--

CÓMO FUNCIONA:

1. El usuario ve un producto con:
   - Nombre: "Atlas 60×60"
   - Información de tarifa: "5.4 m²/caja" y "23.98€/caja"
   - Input de cantidad: número de cajas
   - Botón "Añadir al carrito"

2. Al hacer click en "Añadir al carrito":
   - Se llama a: agregarAlCarritoDesdeProducto(formato, serie, cajas)
   - La función busca el producto en la tarifa
   - Lo agrega al carrito
   - Muestra una notificación con:
     * Confirmación de que se agregó
     * Metros totales
     * Precio total
   - Actualiza el contador en la navbar

3. El usuario puede:
   - Seguir comprando (agregar más productos)
   - Hacer click en "Ver carrito" en la notificación
   - O ir a tienda.html directamente

4. En tienda.html:
   - Ve una tabla con todos los productos del carrito
   - Puede cambiar cantidades
   - Ve metros totales por línea y por pedido
   - Ve precios desde la tarifa

VENTAJAS:
✓ Precios siempre desde la tarifa (una fuente de verdad)
✓ Cálculos precisos de metros
✓ Interfaz clara que muestra cajas y metros
✓ Carrito persistente (localStorage)
✓ Notificaciones visuales al agregar

-->
