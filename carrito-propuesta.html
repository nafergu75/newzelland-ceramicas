<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito por cajas - Newzeland Cerámicas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: #fbf9f4;
            color: #3d4854;
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        h1 { color: #26374a; margin-bottom: 2rem; }

        .carrito-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }

        .carrito-table thead {
            background: #26374a;
            color: white;
        }

        .carrito-table th {
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }

        .carrito-table td {
            padding: 1rem;
            border-bottom: 1px solid #e5e0d5;
        }

        .carrito-table tr:last-child td {
            border-bottom: none;
        }

        /* Información del producto */
        .producto-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .producto-nombre {
            font-weight: 600;
            color: #26374a;
        }

        .producto-descripcion {
            font-size: 0.85rem;
            color: #8a857b;
        }

        /* Cantidad y metros */
        .cantidad-cajas {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 120px;
        }

        .cantidad-cajas input {
            width: 60px;
            padding: 0.4rem;
            border: 1px solid #d9d2c4;
            border-radius: 4px;
            text-align: center;
            font-size: 1rem;
        }

        .metros-display {
            background: #ece4d4;
            padding: 0.75rem;
            border-radius: 4px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .metros-display strong {
            display: block;
            color: #26374a;
            font-weight: 600;
        }

        .metros-display .sublabel {
            font-size: 0.8rem;
            color: #8a857b;
        }

        /* Precio */
        .precio {
            font-weight: 600;
            color: #26374a;
            text-align: right;
            min-width: 100px;
        }

        /* Botón eliminar */
        .btn-eliminar {
            background: #f5e5e0;
            border: none;
            color: #d62828;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .btn-eliminar:hover {
            background: #f0d0c8;
        }

        /* Resumen */
        .resumen {
            background: white;
            border: 2px solid #d9d2c4;
            border-radius: 8px;
            padding: 1.5rem;
            max-width: 500px;
            margin-left: auto;
        }

        .resumen h2 {
            color: #26374a;
            font-size: 1.2rem;
            margin-bottom: 1rem;
            border-bottom: 2px solid #ece4d4;
            padding-bottom: 0.5rem;
        }

        .resumen-linea {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.95rem;
        }

        .resumen-linea.total {
            border-top: 2px solid #ece4d4;
            padding-top: 1rem;
            font-weight: 600;
            color: #26374a;
            font-size: 1.1rem;
        }

        .resumen-linea.metros {
            background: #ece4d4;
            padding: 0.75rem;
            border-radius: 4px;
            margin: 0.5rem 0;
            font-weight: 500;
        }

        /* Carrito vacío */
        .carrito-vacio {
            text-align: center;
            padding: 3rem;
            color: #8a857b;
        }

        .carrito-vacio p {
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
        }

        .btn-comprar {
            background: #26374a;
            color: white;
            padding: 0.75rem 2rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-comprar:hover {
            background: #1a2436;
            box-shadow: 0 4px 12px rgba(38, 55, 74, 0.3);
        }

        .btn-comprar:disabled {
            background: #c0b8b0;
            cursor: not-allowed;
        }

        @media (max-width: 768px) {
            .carrito-table {
                font-size: 0.9rem;
            }
            .carrito-table th,
            .carrito-table td {
                padding: 0.75rem 0.5rem;
            }
            .resumen {
                max-width: 100%;
                margin-left: 0;
                margin-top: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Carrito de Compra</h1>

        <div id="carritoContenedor">
            <!-- Se rellena dinámicamente con JS -->
        </div>
    </div>

    <script src="js/carrito-boxed.js"></script>
    <script>
        /**
         * Renderiza el carrito en HTML
         */
        function renderCarrito() {
            const contenedor = document.getElementById('carritoContenedor');

            if (carrito.items.length === 0) {
                contenedor.innerHTML = `
                    <div class="carrito-vacio">
                        <p>Tu carrito está vacío</p>
                        <a href="productos.html" style="color: #26374a; text-decoration: underline;">Volver a productos</a>
                    </div>
                `;
                return;
            }

            const totales = carrito.calcularTotales();

            // Tabla de items
            let html = `
                <table class="carrito-table">
                    <thead>
                        <tr>
                            <th>Producto</th>
                            <th>M²/caja</th>
                            <th>Cajas</th>
                            <th>Metros Totales</th>
                            <th>Precio/caja</th>
                            <th>Subtotal</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            carrito.items.forEach(item => {
                const metros = carrito.calcularMetros(item);
                const subtotal = carrito.calcularSubtotal(item);

                html += `
                    <tr>
                        <td>
                            <div class="producto-info">
                                <span class="producto-nombre">${item.formato} | ${item.serie}</span>
                                <span class="producto-descripcion">${item.descripcion}</span>
                            </div>
                        </td>
                        <td>${item.metros_por_caja} m²</td>
                        <td>
                            <div class="cantidad-cajas">
                                <button onclick="carrito.actualizarCantidad('${item.id}', ${item.cajas - 1})">−</button>
                                <input type="number" value="${item.cajas}"
                                       onchange="carrito.actualizarCantidad('${item.id}', parseInt(this.value))"
                                       min="1">
                                <button onclick="carrito.actualizarCantidad('${item.id}', ${item.cajas + 1})">+</button>
                            </div>
                        </td>
                        <td>
                            <div class="metros-display">
                                <strong>${metros.toFixed(2)} m²</strong>
                                <span class="sublabel">${item.cajas} cajas × ${item.metros_por_caja}</span>
                            </div>
                        </td>
                        <td class="precio">${item.precio_venta_caja.toFixed(2)}€</td>
                        <td class="precio">${subtotal.toFixed(2)}€</td>
                        <td>
                            <button class="btn-eliminar" onclick="carrito.eliminarDelCarrito('${item.id}')">
                                Eliminar
                            </button>
                        </td>
                    </tr>
                `;
            });

            html += `
                    </tbody>
                </table>

                <div class="resumen">
                    <h2>Resumen del Pedido</h2>
                    <div class="resumen-linea metros">
                        <strong>Total de metros:</strong>
                        <strong>${totales.total_metros.toFixed(2)} m²</strong>
                    </div>
                    <div class="resumen-linea">
                        <span>Total de cajas:</span>
                        <span>${totales.total_cajas}</span>
                    </div>
                    <div class="resumen-linea total">
                        <span>Total a pagar:</span>
                        <span>${totales.total_precio.toFixed(2)}€</span>
                    </div>
                    <button class="btn-comprar" onclick="procesarPedido()">
                        Proceder al pago
                    </button>
                </div>
            `;

            contenedor.innerHTML = html;
        }

        /**
         * Procesa el pedido
         */
        function procesarPedido() {
            const pedido = carrito.exportarPedido();
            console.log('Pedido a procesar:', pedido);

            // Aquí iría la integración con Stripe o tu sistema de pagos
            alert(`Pedido de ${pedido.resumen.total_cajas} cajas (${pedido.resumen.total_metros} m²) por ${pedido.resumen.total_precio}€\n\nPróximamente: integración con pago`);
        }

        // Escucha cambios en el carrito
        window.addEventListener('carritoActualizado', () => {
            renderCarrito();
        });

        // Renderiza inicial
        renderCarrito();

        // DEMO: Agregar algunos productos al carrito (eliminar después)
        setTimeout(() => {
            carrito.agregarAlCarrito('60x60', 'ATLAS', 2);
            carrito.agregarAlCarrito('30x60', 'BASES', 1);
        }, 500);
    </script>
</body>
</html>
