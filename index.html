    <script>
      // Restaurar URL desde sessionStorage (para GitHub Pages 404 redirect)
      if (sessionStorage.redirect) {
        const redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        const path = redirect.split(window.location.host)[1];
        const basename = '/newzelland-ceramicas/';
        // Extraer ruta después del basename para React Router
        const routePath = path.startsWith(basename) ? path.slice(basename.length - 1) : path;
        window.location.replace(routePath);
      }
    </script>
